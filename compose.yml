services:
  swimtrack-postgres:
    image: postgres:16-alpine
    container_name: swimtrack-postgres
    environment:
      POSTGRES_DB: swimtrack
      POSTGRES_USER: swimtrack
      POSTGRES_PASSWORD: swimtrack
    ports:
      - "5433:5432"
    volumes:
      - swimtrack-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swimtrack -d swimtrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  swimtrack-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: swimtrack-backend
    environment:
      PORT: 3000
      DATABASE_URL: postgres://swimtrack:swimtrack@swimtrack-postgres:5432/swimtrack
      JWT_SECRET: swimtrack-local-secret
      JWT_EXPIRES_IN: 1h
      CORS_ORIGIN: http://localhost:8080,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "3000:3000"
    depends_on:
      swimtrack-postgres:
        condition: service_healthy

  swimtrack-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: swimtrack-frontend
    ports:
      - "8080:80"
    depends_on:
      swimtrack-backend:
        condition: service_started

volumes:
  swimtrack-postgres-data:
