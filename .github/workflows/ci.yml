name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: Lint, build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgres://swimtrack:swimtrack@localhost:5433/swimtrack
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Show Docker Compose version
        run: docker compose version

      - name: Lint workspaces
        run: npm run lint --workspaces

      - name: Build project
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Run coverage
        run: npm run test:coverage

      - name: Start PostgreSQL for integration tests
        run: docker compose up -d swimtrack-postgres

      - name: Wait for PostgreSQL readiness
        run: |
          for attempt in {1..60}; do
            if docker compose exec -T swimtrack-postgres pg_isready -U swimtrack -d swimtrack; then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL... attempt ${attempt}/60"
            sleep 1
          done

          echo "PostgreSQL did not become ready within 60 seconds"
          docker compose ps
          docker compose logs swimtrack-postgres --tail=100
          exit 1

      - name: Show PostgreSQL diagnostics
        run: |
          docker compose ps
          docker compose logs swimtrack-postgres --tail=100

      - name: Apply database schema
        env:
          DATABASE_URL: postgres://swimtrack:swimtrack@localhost:5433/swimtrack
        run: |
          npm run db:schema --workspace backend || {
            echo "Database schema failed. PostgreSQL logs:"
            docker compose logs swimtrack-postgres --tail=100
            exit 1
          }

      - name: Run integration tests
        run: npm run test:integration

      - name: Run Docker E2E tests
        run: npm run test:e2e:docker

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
